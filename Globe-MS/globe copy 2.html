<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morning Scroll · Pulse Globe</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  #globe-canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* Minimal HUD */
  #hud {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    pointer-events:none; user-select:none;
  }
  #pulse-count {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(160,200,255,0.55);
  }
  #pulse-ring {
    width:6px; height:6px; border-radius:50%;
    background:rgba(100,180,255,0.7);
    box-shadow: 0 0 8px 2px rgba(100,180,255,0.4);
    animation: pulseRing 2.8s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%,100% { opacity:0.5; transform:scale(1); }
    50% { opacity:1; transform:scale(1.4); }
  }

  #drag-hint {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'DM Mono','Courier New',monospace;
    font-size:10px; letter-spacing:0.2em; color:rgba(140,180,255,0.3);
    pointer-events:none; transition:opacity 1.5s;
    text-transform:uppercase;
  }
  #drag-hint.hidden { opacity:0; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="globe-canvas"></canvas>

<div id="hud">
  <div id="pulse-ring"></div>
  <div id="pulse-count">247 scrolling now</div>
</div>

<div id="drag-hint">drag to explore</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  GLOBE.JS — Morning Scroll Pulse Globe
//  Derived from room/preview.js atmosphere system.
//  Key differences from preview.js:
//    • Camera OUTSIDE sphere (z=3.2) not inside a box
//    • Drag rotates the GLOBE MESH, not the scene
//    • Atmosphere (shells, sky, stars) stays fixed in space
//    • Fresnel glow in sceneEffects → gets bloom
//    • Solid globe in sceneGlobe → renders clean on top
// ═══════════════════════════════════════════════════════════════

// ── Startup diagnostic — tests if image files are reachable ──
['Land_ocean_ice.jpg', 'BlackMarble.jpg'].forEach(name => {
  fetch(name).then(r => {
    console.log(`${name}: HTTP ${r.status} ${r.ok ? '✓ FOUND' : '✗ NOT FOUND'}`);
  }).catch(e => console.error(`${name}: fetch error`, e));
});

let renderer, sceneGlobe, sceneEffects, camera;
let bloomRT1, bloomRT2, bloomQuad;
const bloomStrength = 0.22;

let shellMats = [], shellMeshes = [];
let skyMat, pMat;
let globeMesh, glowMesh;
let shootingStars = [], nextStarTime = 0;
const nebFlowAccum = new THREE.Vector3(0, 0, 0);

// Globe rotation — X must start at 0 so UV lat/lon math stays aligned with mesh
// Earth's axial tilt is expressed via the sun's declination (uSunLat), not mesh rotation
let globeRotX = 0;
let globeRotY = 0;
const AUTO_SPIN = 0.0006;  // radians/frame at 60fps — slow eastward

// Drag / inertia
let isDragging = false, prevX = 0, prevY = 0;
let velYaw = 0, velPitch = 0;   // momentum after release

// ── Simplex noise GLSL (verbatim from preview.js) ──
const NOISE_G = `vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}vec4 tIS(vec4 r){return 1.79284291400159-.85373472095314*r;}float snoise(vec3 v){const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;vec3 i1=min(g,l.zxy);vec3 i2=max(g,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod289(i);vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));float n_=.142857142857;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);vec4 norm=tIS(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}`;


// ── NEBULA SHELL FRAGMENT (from preview.js, nebula mode) ──
const SHELL_FRAG = `${NOISE_G}
  uniform float uTime,uO,uS,uSp,uBr,uThresh;
  uniform vec3 uC1,uC2,uFlow;
  varying vec3 vW;
  void main(){
    vec3 d=normalize(vW);
    float t=uTime*uSp;
    vec3 sp=d*uS+t+uFlow;
    float n=snoise(sp)*.6+snoise(sp*2.5+t*1.3)*.3+snoise(sp*6.+t*.7)*.1;
    n=smoothstep(uThresh, uThresh+0.6, n);
    gl_FragColor=vec4(mix(uC1,uC2,n)*1.8*uBr, n*uO*uBr);
  }
`;

// ── GLOBE TEXTURE-BASED FRAGMENT ──
// The terminator is computed entirely in UV / geographic (lat-lon) space.
// uSunLat and uSunLon are the subsolar point in radians, calculated ONCE on
// load and never updated — so the terminator is baked into the texture coords
// and rotates perfectly with the globe when the user drags.
const GLOBE_FRAG = `
  uniform sampler2D uDayTex;
  uniform sampler2D uNightTex;
  uniform float     uSunLat;   // subsolar latitude  in radians (-PI/2 .. PI/2)
  uniform float     uSunLon;   // subsolar longitude in radians (-PI   .. PI)
  uniform float     uTexReady; // 0→1 fade-in once textures loaded
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  void main(){
    vec3 n = normalize(vNormal);

    // ── Convert UV to geographic lat/lon ──
    // Three.js SphereGeometry UV: u=0..1 west→east, v=0..1 south→north
    float lon = (vUv.x - 0.5) * 6.28318530718;  // -PI .. PI
    float lat = (vUv.y - 0.5) * 3.14159265359;  // -PI/2 .. PI/2

    // ── Terminator: angular distance from subsolar point ──
    // This is the spherical law of cosines. sunDot > 0 = day, < 0 = night.
    float sunDot = sin(lat) * sin(uSunLat)
                 + cos(lat) * cos(uSunLat) * cos(lon - uSunLon);

    // ── Sample both textures at the same UV (both are equirectangular) ──
    vec4 dayCol   = texture2D(uDayTex,   vUv);
    vec4 nightCol = texture2D(uNightTex, vUv);

    // Slightly darken + desaturate day side so the two photos feel cohesive
    vec3 dayRgb = dayCol.rgb * 0.78;
    float dayLum = dot(dayRgb, vec3(0.299, 0.587, 0.114));
    dayRgb = mix(dayRgb, vec3(dayLum), 0.12);

    // Boost night lights — they are dim in the raw texture
    vec3 nightRgb = nightCol.rgb * 1.6;

    // ── Day/night blend ──
    float dayMix = smoothstep(-0.08, 0.08, sunDot);

    // ── Twilight band — warm amber at the terminator edge ──
    float twi = clamp(1.0 - abs(sunDot / 0.10), 0.0, 1.0);
    twi = pow(twi, 1.8);
    vec3 twilightCol = vec3(1.0, 0.52, 0.12) * twi * 0.6;

    // ── Polar blend — use day texture for geography but darken by sun angle ──
    // At poles the night texture looks wrong, so we use the day texture's colors
    // as the base, but dim them according to how deep into night the fragment is.
    float polarBlend = smoothstep(0.62, 0.80, abs(lat) / 1.5708);

    // Night darkness factor: 0.0 = full night, 1.0 = full day
    // sunDot ranges from -1 (opposite sun) to +1 (facing sun)
    // We allow a small ambient so it never goes completely black
    float nightDark = smoothstep(-0.5, 0.1, sunDot) * 0.92 + 0.08;

    // Darken the day texture to simulate night at the poles
    vec3 polarNightRgb = dayRgb * nightDark;

    // Blend: mid-latitudes use the normal day/night texture mix,
    // poles use the darkened day texture
    float finalDayMix = max(dayMix, polarBlend);
    vec3 baseCol = mix(nightRgb, dayRgb, finalDayMix);
    // At poles, override with the darkened day texture
    baseCol = mix(baseCol, polarNightRgb, polarBlend);

    // ── Compose ──
    vec3 col = baseCol + twilightCol;

    // ── Fresnel atmospheric rim ──
    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    float rim = 1.0 - max(dot(n, viewDir), 0.0);
    rim = pow(rim, 4.5);
    col += vec3(0.05, 0.16, 0.65) * rim * 0.45;

    gl_FragColor = vec4(col * uTexReady, 1.0);
  }
`;


function init(){
  const canvas = document.getElementById('globe-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 3));
  renderer.autoClear = false;

  // Two scenes — exactly like preview.js
  sceneEffects = new THREE.Scene();  // sky + shells + stars + glow → bloom
  sceneGlobe   = new THREE.Scene();  // solid globe → rendered clean on top

  // Camera OUTSIDE the globe, fixed, looking at origin
  camera = new THREE.PerspectiveCamera(52, 1, 0.01, 500);
  // Camera sits low and looks up — globe floats above the viewer
  camera.position.set(0, -0.85, 3.1);
  camera.lookAt(0, -0.1, 0);

  setupAtmosphere();
  setupGlobe();
  setupBloom();
  setupInput();
  onResize();

  // ── Calculate subsolar point ONCE on load ──
  // This is the lat/lon where the sun is directly overhead right now.
  // Passed as static uniforms — never updated during the session.
  {
    const now = new Date();
    const utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
    const dayOfYear = Math.floor((now - new Date(now.getUTCFullYear(),0,0)) / 86400000);
    // Solar declination: sun's latitude (axial tilt), ±23.45° over the year
    // This IS Earth's tilt — it makes the terminator diagonal, not vertical
    const sunLat = -23.45 * Math.cos((2*Math.PI/365) * (dayOfYear + 10)) * Math.PI/180;

    // Subsolar longitude: sun is at lon 0° (Greenwich) at UTC 12:00 noon.
    // Clamp to -PI..PI range cleanly.
    const sunLonDeg = (12 - utcH) * 15;
    const sunLon = sunLonDeg * Math.PI / 180;

    globeMesh.material.uniforms.uSunLat.value = sunLat;
    globeMesh.material.uniforms.uSunLon.value = sunLon;
    console.log(`Subsolar point: lat=${(sunLat*180/Math.PI).toFixed(1)}° lon=${(sunLonDeg).toFixed(1)}° | Earth tilt contributing: ${(sunLat*180/Math.PI).toFixed(1)}°`);
  }

  // ── Orient globe so the user's longitude faces the camera on load ──
  // timezoneOffset in minutes → degrees → radians
  const tzLon = (new Date().getTimezoneOffset() / 60) * -15;
  globeRotY = tzLon * (Math.PI / 180);
  if(globeMesh){ globeMesh.rotation.y = globeRotY; glowMesh.rotation.y = globeRotY; }

  animate();

  // Fade hint after first drag
  setTimeout(() => {
    document.getElementById('drag-hint').classList.add('hidden');
  }, 4000);
}


// ═══════════════════════════════════════════
//  ATMOSPHERE — ported directly from preview.js
// ═══════════════════════════════════════════
function setupAtmosphere(){

  // Sky dome — darker than room default (space feel, not cosy room)
  skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false,
    uniforms:{
      uTime:{value:0}, uBr:{value:0.5},
      uTop:{value:new THREE.Color(0x06091a)},
      uBot:{value:new THREE.Color(0x020308)}
    },
    vertexShader:`varying vec3 vP;void main(){vP=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform float uTime,uBr;uniform vec3 uTop,uBot;varying vec3 vP;void main(){vec3 d=normalize(vP);float t=smoothstep(-0.5,0.7,d.y);vec3 c=mix(uBot,uTop+sin(uTime*.07)*.025,t);gl_FragColor=vec4(c*1.6*uBr,1.);}`
  });
  sceneEffects.add(new THREE.Mesh(new THREE.SphereGeometry(200,32,32), skyMat));

  // Nebula shells — same radii as preview.js (r=6, 18, 50)
  // Slightly more saturated blue/purple palette for space feel
  [
    {r:6,  o:.11, s:10,  sp:.013, c1:[.18,.12,.42], c2:[.45,.28,.72], thresh:0.38},
    {r:18, o:.065,s:3.5, sp:.006, c1:[.08,.08,.32], c2:[.28,.18,.52], thresh:0.38},
    {r:50, o:.038,s:1.2, sp:.003, c1:[.04,.04,.22], c2:[.18,.09,.38], thresh:0.38}
  ].forEach(L => {
    const m = new THREE.ShaderMaterial({
      uniforms:{
        uTime:{value:0}, uO:{value:L.o}, uS:{value:L.s}, uSp:{value:L.sp},
        uC1:{value:new THREE.Color(...L.c1)}, uC2:{value:new THREE.Color(...L.c2)},
        uBr:{value:1}, uFlow:{value:new THREE.Vector3(0,0,0)}, uThresh:{value:L.thresh}
      },
      vertexShader:`varying vec3 vW;void main(){vW=normalize((modelMatrix*vec4(position,1.)).xyz);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader: SHELL_FRAG,
      transparent:true, depthWrite:false, side:THREE.BackSide, blending:THREE.AdditiveBlending
    });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(L.r, 48, 48), m);
    sceneEffects.add(mesh);
    shellMats.push(m); shellMeshes.push(mesh);
  });

  // Star field particles — from preview.js
  const PC = 7000;
  const pp=new Float32Array(PC*3), ps=new Float32Array(PC), pb=new Float32Array(PC);
  const CLUSTER_COUNT = 20, clusters = [];
  for(let i=0;i<CLUSTER_COUNT;i++){
    clusters.push({t:Math.random()*Math.PI*2, p:Math.acos(2*Math.random()-1), str:0.3+Math.random()*0.7});
  }
  for(let i=0;i<PC;i++){
    let t=Math.random()*Math.PI*2, p2=Math.acos(2*Math.random()-1);
    if(Math.random()<0.55){
      const cl=clusters[Math.floor(Math.random()*CLUSTER_COUNT)];
      const bl=0.3+Math.random()*0.5;
      t+=(cl.t-t)*bl*cl.str; p2+=(cl.p-p2)*bl*cl.str;
    }
    const r=55+Math.pow(Math.random(),.6)*105;
    pp[i*3]=r*Math.sin(p2)*Math.cos(t); pp[i*3+1]=r*Math.sin(p2)*Math.sin(t); pp[i*3+2]=r*Math.cos(p2);
    ps[i]=.3+Math.random()*2.2; pb[i]=.4+Math.random()*.6;
  }
  const pG=new THREE.BufferGeometry();
  pG.setAttribute('position',new THREE.Float32BufferAttribute(pp,3));
  pG.setAttribute('aSize',new THREE.Float32BufferAttribute(ps,1));
  pG.setAttribute('aBr',new THREE.Float32BufferAttribute(pb,1));
  pMat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0},uPR:{value:Math.min(devicePixelRatio,3)},uBr:{value:0.55}},
    vertexShader:[
      'attribute float aSize,aBr;','uniform float uTime,uPR;','varying float vO,vB;',
      'void main(){',
      '  vec4 mv=modelViewMatrix*vec4(position,1.);float d=-mv.z;',
      '  gl_PointSize=clamp(aSize*uPR*(300./d),.5,10.);',
      '  gl_Position=projectionMatrix*mv;',
      '  vO=smoothstep(170.,25.,d)*smoothstep(10.,25.,d);vB=aBr;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform float uBr;','varying float vO,vB;',
      'void main(){',
      '  float d=length(gl_PointCoord-.5);if(d>.5)discard;',
      '  float a=(1.-smoothstep(0.,.5,d))*vO;',
      '  vec3 c=mix(vec3(.65,.78,1.),vec3(1.,.9,.82),vB)*1.4*vB;',
      '  gl_FragColor=vec4(c*uBr,a*uBr*0.45);',
      '}'
    ].join('\n'),
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  sceneEffects.add(new THREE.Points(pG,pMat));

  // Shooting stars pool
  const STAR_POOL=6, pool=[];
  for(let si=0;si<STAR_POOL;si++){
    const sg=new THREE.BufferGeometry();
    const sv=new Float32Array(6*3);
    sg.setAttribute('position',new THREE.BufferAttribute(sv,3));
    const sw=new Float32Array([1,1,0,0,1,0]);
    sg.setAttribute('aW',new THREE.BufferAttribute(sw,1));
    const sm=new THREE.ShaderMaterial({
      uniforms:{uAlpha:{value:0}},
      vertexShader:`attribute float aW;varying float vW;void main(){vW=aW;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform float uAlpha;varying float vW;void main(){float b=vW*vW;gl_FragColor=vec4(vec3(1.)*(0.9+b*.1),b*uAlpha);}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide
    });
    const smesh=new THREE.Mesh(sg,sm);
    smesh.visible=false;
    sceneEffects.add(smesh);
    pool.push({mesh:smesh,geo:sg,mat:sm,verts:sv});
  }
  window._starPool=pool; window._starPoolIdx=0;
  nextStarTime = performance.now() + 2500 + Math.random()*4000;

  // ── Globe atmosphere glow (goes in sceneEffects → gets bloom) ──
  // Fresnel-based blue-cyan halo around the globe position
  const glowMat = new THREE.ShaderMaterial({
    vertexShader:`
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main(){
        vNormal   = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir  = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }`,
    fragmentShader:`
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main(){
        float rim = 1.0 - max(dot(vNormal, vViewDir), 0.0);
        rim = pow(rim, 2.2);
        // Cyan-blue limb glow, more intense at very edge
        float edge = pow(rim, 4.5);
        vec3 col = mix(vec3(0.08, 0.28, 0.9), vec3(0.4, 0.75, 1.0), edge);
        float alpha = rim * 0.7 * (0.5 + edge * 0.5);
        gl_FragColor = vec4(col * 1.6, alpha);
      }`,
    transparent:true, depthWrite:false, side:THREE.FrontSide, blending:THREE.AdditiveBlending
  });
  glowMesh = new THREE.Mesh(new THREE.SphereGeometry(1.055, 80, 80), glowMat);
  sceneEffects.add(glowMesh);

  // ── Atmosphere halo — single billboard sprite with smooth radial gradient ──
  // One flat quad always facing the camera, sized larger than the globe.
  // The shader computes distance from center and maps a smooth 4-stop color ramp.
  // No visible banding — continuous falloff like a real atmospheric glow.
  const haloMat = new THREE.ShaderMaterial({
    uniforms: {
      uGlobeRadius: { value: 1.0 }   // globe is radius 1.0 in world units
    },
    vertexShader: `
      varying vec2 vUv;
      void main(){
        vUv = uv;
        // Billboard: ignore model rotation, always face camera
        vec3 camRight = vec3(viewMatrix[0][0], viewMatrix[1][0], viewMatrix[2][0]);
        vec3 camUp    = vec3(viewMatrix[0][1], viewMatrix[1][1], viewMatrix[2][1]);
        // Quad is 3.2 units wide — covers globe (r=1) plus atmosphere
        vec3 worldPos = (camRight * (uv.x - 0.5) + camUp * (uv.y - 0.5)) * 3.2;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
      }`,
    fragmentShader: `
      varying vec2 vUv;
      void main(){
        // Distance from center of quad, normalized so globe edge = ~0.625
        // (globe radius 1.0 / quad half-width 1.6 = 0.625)
        float dist = length(vUv - 0.5) * 2.0;  // 0 = center, 1 = quad edge

        // Globe surface sits at dist ≈ 0.625 in this space
        float t = (dist - 0.58) / (1.0 - 0.58);  // 0 at surface, 1 at outer edge
        t = clamp(t, 0.0, 1.0);

        // Clip inside the globe — no glow on the face
        if(dist < 0.60) discard;

        // 4-stop color ramp: sky blue → horizon blue → deep blue → navy → transparent
        // Stop positions along t (0=surface, 1=outer edge)
        vec3 c0 = vec3(0.60, 0.88, 1.00);  // sky blue
        vec3 c1 = vec3(0.25, 0.55, 0.90);  // horizon blue
        vec3 c2 = vec3(0.08, 0.25, 0.60);  // deep blue
        vec3 c3 = vec3(0.02, 0.07, 0.25);  // space navy

        vec3 col;
        float alpha;
        if(t < 0.25){
          float s = t / 0.25;
          col = mix(c0, c1, s);
          // Tight bright inner band
          alpha = (1.0 - s) * 0.55 + s * 0.35;
        } else if(t < 0.55){
          float s = (t - 0.25) / 0.30;
          col = mix(c1, c2, s);
          alpha = (1.0 - s) * 0.35 + s * 0.18;
        } else if(t < 0.80){
          float s = (t - 0.55) / 0.25;
          col = mix(c2, c3, s);
          alpha = (1.0 - s) * 0.18 + s * 0.07;
        } else {
          float s = (t - 0.80) / 0.20;
          col = c3;
          alpha = (1.0 - s) * 0.07;  // fade cleanly to zero
        }

        // Smooth the inner edge so it doesn't hard-clip at the globe surface
        float innerFade = smoothstep(0.60, 0.66, dist);
        alpha *= innerFade;

        gl_FragColor = vec4(col, alpha);
      }`,
    transparent: true,
    depthWrite:  false,
    depthTest:   false,
    blending:    THREE.AdditiveBlending,
    side:        THREE.DoubleSide
  });

  const haloQuad = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), haloMat);
  sceneEffects.add(haloQuad);
}


// ═══════════════════════════════════════════
//  GLOBE — real NASA textures, day/night blend
// ═══════════════════════════════════════════
function setupGlobe(){
  const loader = new THREE.TextureLoader();

  // Placeholder 1×1 dark texture so the globe renders (black) before files load
  const blank = new THREE.DataTexture(new Uint8Array([0,0,0,255]), 1, 1, THREE.RGBAFormat);
  blank.needsUpdate = true;

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uDayTex:   { value: blank },
      uNightTex: { value: blank },
      uSunLat:   { value: 0.0 },   // set once in init(), never changed
      uSunLon:   { value: 0.0 },   // set once in init(), never changed
      uTexReady: { value: 0.0 }
    },
    vertexShader:`
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying vec2 vUv;
      void main(){
        vNormal   = normalize(normalMatrix * normal);
        vec4 wp   = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        vUv       = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: GLOBE_FRAG,
    side: THREE.FrontSide
  });

  globeMesh = new THREE.Mesh(new THREE.SphereGeometry(1.0, 96, 96), mat);
  sceneGlobe.add(globeMesh);

  // Load both textures — fade in as each one arrives, log errors clearly
  let loadedCount = 0;
  function onLoaded(){
    loadedCount++;
    console.log(`Texture ${loadedCount}/2 loaded`);
    // Fade in as soon as EITHER texture is ready — don't wait for both
    if(loadedCount === 1) fadeInGlobe();
  }
  function onError(name){ return (err) => { console.error(`TEXTURE LOAD FAILED: ${name}`, err); }; }

  loader.load(
    'Land_ocean_ice.jpg',
    tex => { mat.uniforms.uDayTex.value = tex; onLoaded(); },
    undefined,
    onError('Land_ocean_ice.jpg')
  );
  loader.load(
    'BlackMarble.jpg',
    tex => { mat.uniforms.uNightTex.value = tex; onLoaded(); },
    undefined,
    onError('BlackMarble.jpg')
  );
}

// Smooth fade-in once textures start loading
function fadeInGlobe(){
  const mat = globeMesh.material;
  const start = performance.now();
  const dur = 1200; // ms
  function tick(){
    const p = Math.min((performance.now() - start) / dur, 1.0);
    mat.uniforms.uTexReady.value = p * p * (3 - 2 * p); // smoothstep
    if(p < 1.0) requestAnimationFrame(tick);
  }
  tick();
}

// Hard fallback — if textures take >8s, show globe anyway (avoids permanent black)
setTimeout(() => {
  if(globeMesh && globeMesh.material.uniforms.uTexReady.value < 1.0){
    console.warn("Texture load timeout — forcing globe visible");
    globeMesh.material.uniforms.uTexReady.value = 1.0;
  }
}, 8000);


// ═══════════════════════════════════════════
//  BLOOM — verbatim pipeline from preview.js
// ═══════════════════════════════════════════
function setupBloom(){
  const pr=Math.min(devicePixelRatio,3);
  const pw=Math.floor(innerWidth*pr), ph=Math.floor(innerHeight*pr);
  const bw=Math.floor(pw/2), bh=Math.floor(ph/2);
  bloomRT1=new THREE.WebGLRenderTarget(bw,bh);
  bloomRT2=new THREE.WebGLRenderTarget(bw,bh);

  const sg=new THREE.PlaneGeometry(2,2);
  const blurMat=new THREE.ShaderMaterial({
    uniforms:{tDiffuse:{value:null},uDir:{value:new THREE.Vector2(1,0)},uRes:{value:new THREE.Vector2(bw,bh)}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}`,
    fragmentShader:`uniform sampler2D tDiffuse;uniform vec2 uDir,uRes;varying vec2 vUv;void main(){vec2 px=uDir/uRes;vec4 c=vec4(0.);float w[5];w[0]=.227027;w[1]=.194596;w[2]=.121622;w[3]=.054054;w[4]=.016216;c+=texture2D(tDiffuse,vUv)*w[0];for(int i=1;i<5;i++){c+=texture2D(tDiffuse,vUv+px*float(i))*w[i];c+=texture2D(tDiffuse,vUv-px*float(i))*w[i];}gl_FragColor=c;}`
  });
  const compMat=new THREE.ShaderMaterial({
    uniforms:{tEffects:{value:null},tBloom:{value:null},uStr:{value:bloomStrength}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}`,
    fragmentShader:`uniform sampler2D tEffects,tBloom;uniform float uStr;varying vec2 vUv;void main(){vec4 e=texture2D(tEffects,vUv);vec4 b=texture2D(tBloom,vUv);gl_FragColor=e+b*uStr*3.;}`
  });
  const effectsRT=new THREE.WebGLRenderTarget(pw,ph);
  bloomQuad={blurMat,compMat,
    mesh:new THREE.Mesh(sg,blurMat),compMesh:new THREE.Mesh(sg,compMat),effectsRT};
  bloomQuad.blurScene=new THREE.Scene();bloomQuad.blurScene.add(bloomQuad.mesh);
  bloomQuad.compScene=new THREE.Scene();bloomQuad.compScene.add(bloomQuad.compMesh);
  bloomQuad.blurCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
}


// ═══════════════════════════════════════════
//  INPUT — drag rotates GLOBE MESH, not scene
// ═══════════════════════════════════════════
function setupInput(){
  const canvas = document.getElementById('globe-canvas');
  let hasDragged = false;

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId); // keep tracking even if pointer leaves canvas
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
    velYaw = 0; velPitch = 0;
    if(!hasDragged){
      hasDragged = true;
      document.getElementById('drag-hint').classList.add('hidden');
    }
  });

  document.addEventListener('pointermove', e => {
    if(!isDragging) return;
    e.preventDefault();
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    velYaw   = dx * 0.007;
    velPitch = dy * 0.007;
    globeRotY += velYaw;
    globeRotX += velPitch;
    globeRotX = Math.max(-Math.PI*0.48, Math.min(Math.PI*0.48, globeRotX));
    prevX = e.clientX;
    prevY = e.clientY;
  }, { passive: false });

  document.addEventListener('pointerup',     () => { isDragging = false; });
  document.addEventListener('pointercancel', () => { isDragging = false; });
}


// ═══════════════════════════════════════════
//  ANIMATE LOOP
// ═══════════════════════════════════════════
let lastTime = performance.now();

function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now-lastTime)/1000, 0.05);
  lastTime  = now;
  const t   = now*0.001;

  // ── Globe rotation + inertia ──
  if(!isDragging){
    // Momentum decay — feels like spinning a real globe
    velYaw   *= 0.94;
    velPitch *= 0.88;
    globeRotY += velYaw;
    globeRotX += velPitch;
    // Auto-spin eastward once momentum fades
    if(Math.abs(velYaw) < 0.0008) globeRotY += AUTO_SPIN;
  }
  globeRotX = Math.max(-Math.PI*0.48, Math.min(Math.PI*0.48, globeRotX));

  // Apply to both meshes (globe + glow must stay aligned)
  globeMesh.rotation.x = globeRotX;
  globeMesh.rotation.y = globeRotY;
  glowMesh.rotation.x  = globeRotX;
  glowMesh.rotation.y  = globeRotY;

  // ── Atmosphere updates ──
  shellMats.forEach(m => { m.uniforms.uTime.value = t; });
  if(skyMat) skyMat.uniforms.uTime.value = t;
  if(pMat) pMat.uniforms.uTime.value = t;

  // Nebula flow drift — base drift plus drag disturbance
  nebFlowAccum.x += 0.003 * dt;
  nebFlowAccum.y += 0.002 * dt;
  nebFlowAccum.z += 0.06  * dt;
  if(isDragging){
    nebFlowAccum.x += velYaw   * 0.15;
    nebFlowAccum.y += velPitch * 0.10;
  }
  shellMats.forEach(m => m.uniforms.uFlow.value.copy(nebFlowAccum));

  // ── Shooting stars ──
  updateShootingStars(now, dt);

  // ── Render pipeline (from preview.js) ──
  // Step 1: Effects scene → offscreen RT
  renderer.setRenderTarget(bloomQuad.effectsRT);
  renderer.clear(true,true,true);
  renderer.render(sceneEffects, camera);

  // Step 2: Blur H
  bloomQuad.blurMat.uniforms.tDiffuse.value = bloomQuad.effectsRT.texture;
  bloomQuad.blurMat.uniforms.uDir.value.set(1,0);
  bloomQuad.mesh.material = bloomQuad.blurMat;
  renderer.setRenderTarget(bloomRT1); renderer.clear();
  renderer.render(bloomQuad.blurScene, bloomQuad.blurCam);

  // Step 3: Blur V
  bloomQuad.blurMat.uniforms.tDiffuse.value = bloomRT1.texture;
  bloomQuad.blurMat.uniforms.uDir.value.set(0,1);
  renderer.setRenderTarget(bloomRT2); renderer.clear();
  renderer.render(bloomQuad.blurScene, bloomQuad.blurCam);

  // Step 4: Composite → screen
  bloomQuad.compMat.uniforms.tEffects.value = bloomQuad.effectsRT.texture;
  bloomQuad.compMat.uniforms.tBloom.value   = bloomRT2.texture;
  bloomQuad.compMesh.material = bloomQuad.compMat;
  renderer.setRenderTarget(null); renderer.clear();
  renderer.render(bloomQuad.compScene, bloomQuad.blurCam);

  // Step 5: Globe CLEAN on top — no bloom blur applied
  renderer.clearDepth();
  renderer.render(sceneGlobe, camera);
}


// ── Shooting star update (ported from preview.js) ──
function updateShootingStars(now, dt){
  const pool = window._starPool;
  if(!pool) return;

  if(now > nextStarTime && shootingStars.length < 3){
    const slot = pool[window._starPoolIdx % pool.length];
    window._starPoolIdx++;
    const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
    const r=38+Math.random()*20;
    const ox=r*Math.sin(phi)*Math.cos(theta), oy=r*Math.sin(phi)*Math.sin(theta), oz=r*Math.cos(phi);
    const dir=new THREE.Vector3(-ox,-oy,-oz).normalize();
    dir.x+=(Math.random()-.5)*.6; dir.y+=(Math.random()-.5)*.6; dir.z+=(Math.random()-.5)*.6;
    dir.normalize();
    const life=1.0+Math.random()*0.9;
    slot.mesh.visible=true;
    shootingStars.push({slot,ox,oy,oz,dir,life,maxLife:life,speed:18+Math.random()*14,width:.07+Math.random()*.11});
    nextStarTime = now + 3500 + Math.random()*6000;
  }

  for(let si=shootingStars.length-1;si>=0;si--){
    const s=shootingStars[si];
    s.life -= dt;
    if(s.life<=0){ s.slot.mesh.visible=false; shootingStars.splice(si,1); continue; }
    const progress=1-(s.life/s.maxLife);
    const alpha=Math.sin(progress*Math.PI)*0.9;
    const dist=progress*s.speed*s.maxLife;
    const trail=Math.min(dist, 4+s.width*7);
    const hx=s.ox+s.dir.x*dist, hy=s.oy+s.dir.y*dist, hz=s.oz+s.dir.z*dist;
    const tx=hx-s.dir.x*trail, ty=hy-s.dir.y*trail, tz=hz-s.dir.z*trail;
    const camFwd=new THREE.Vector3(0,0,-1);
    const perp=new THREE.Vector3().crossVectors(s.dir,camFwd).normalize().multiplyScalar(s.width*.18);
    const v=s.slot.verts;
    v[0]=hx+perp.x;v[1]=hy+perp.y;v[2]=hz+perp.z;
    v[3]=hx-perp.x;v[4]=hy-perp.y;v[5]=hz-perp.z;
    v[6]=tx+perp.x;v[7]=ty+perp.y;v[8]=tz+perp.z;
    v[9]=hx-perp.x;v[10]=hy-perp.y;v[11]=hz-perp.z;
    v[12]=tx-perp.x;v[13]=ty-perp.y;v[14]=tz-perp.z;
    v[15]=tx+perp.x;v[16]=ty+perp.y;v[17]=tz+perp.z;
    s.slot.geo.attributes.position.needsUpdate=true;
    s.slot.mat.uniforms.uAlpha.value=alpha;
  }
}


// ── Resize ──
function onResize(){
  const canvas=document.getElementById('globe-canvas');
  const w=canvas.clientWidth, h=canvas.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  // Rebuild bloom RTs at new size
  const pr=Math.min(devicePixelRatio,3);
  const pw=Math.floor(w*pr), ph=Math.floor(h*pr);
  const bw=Math.floor(pw/2), bh=Math.floor(ph/2);
  bloomRT1.setSize(bw,bh); bloomRT2.setSize(bw,bh);
  bloomQuad.effectsRT.setSize(pw,ph);
  bloomQuad.blurMat.uniforms.uRes.value.set(bw,bh);
}
window.addEventListener('resize', onResize);

init();
</script>
