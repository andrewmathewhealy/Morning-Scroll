name = "morning-scroll-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# Uncomment when you're ready for weather:
# [vars]
# WEATHER_UNITS = "metric"

# API keys are set as secrets via:
#   wrangler secret put WEATHER_API_KEY
#   wrangler secret put YOUTUBE_API_KEY
# Never put real keys in this file.

# KV namespace for cached feeds (videos, etc.)
[[kv_namespaces]]
binding = "FEED_CACHE"
id = "71fcbbfa90c6401f90926dfa7016ef3b"

# Cron trigger: refresh video feed every 4 hours
[triggers]
crons = ["0 */4 * * *"]
